name: Java CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'
      - name: Compile
        run: javac -d out $(find src -name '*.java')
      - name: Run tests
        run: java -cp out org.junit.runner.JUnitCore com.example.MyTests
